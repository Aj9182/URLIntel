<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='url1.png') }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <style>
    /* GLASS EFFECT */
    .glass {
      backdrop-filter: blur(20px);
      border-radius: 1rem;
      transition: all 0.3s ease-in-out;
    }
    body:not(.dark) .glass {
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(0,0,0,0.1);
      color: #111;
    }
    body.dark .glass {
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,255,0.4);
      box-shadow: 0 0 20px rgba(0,255,255,0.5);
      color: #fff;
    }

    /* Table header gradient */
    .table-header {
      background: linear-gradient(to right, #0f172a, #1e293b);
    }
    #particle-network{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;
}

.grid-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-size:40px 40px;
pointer-events:none;
z-index:-1;
}

.grid-overlay{
background-image:
linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
}

.dark .grid-overlay{
background-image:
linear-gradient(to right, rgba(255,255,255,0.06) 1px, transparent 1px),
linear-gradient(to bottom, rgba(255,255,255,0.06) 1px, transparent 1px);
}

/* ===== MOBILE HAMBURGER NAV ===== */
.nav-hamburger {
  display: none;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  cursor: pointer;
  padding: 6px;
  background: none;
  border: none;
  color: inherit;
}
.nav-hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: currentColor;
  border-radius: 2px;
  transition: all 0.3s ease;
}
.nav-menu-mobile {
  display: none;
  flex-direction: column;
  gap: 6px;
  padding: 0 16px 12px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.nav-menu-mobile.open {
  display: flex;
}
@media (max-width: 768px) {
  .nav-hamburger { display: flex; }
  .nav-links-desktop { display: none !important; }
}
  </style>
</head>

<body class="bg-gray-100 dark:bg-black text-slate-800 dark:text-white transition-colors duration-500 min-h-screen">
<!-- PARTICLES -->
<canvas id="particle-network"></canvas>

<!-- GRID -->
<div class="grid-overlay"></div>
<!-- ===== HEADER ===== -->
<header class="fixed top-0 left-0 w-full z-50 glass" id="mainNav">
  <div class="flex justify-between items-center px-6 py-4">
    <!-- LOGO -->
    <div class="flex items-center gap-3">
      <img src="{{ url_for('static', filename='url1.png') }}" class="w-8 h-8">
      <span class="text-xl font-bold text-black dark:text-white">History</span>
    </div>

    <div class="flex items-center gap-2">
      <!-- NAV LINKS (desktop) -->
      <nav class="nav-links-desktop flex items-center gap-4 bg-white/40 dark:bg-white/10 backdrop-blur-md p-1 rounded-xl">
        <a href="/" class="px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-white/20 transition">Home</a>
        <a href="/history" class="px-4 py-2 rounded-lg bg-white text-black dark:bg-white dark:text-black font-medium transition">History</a>
        <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-200 dark:bg-gray-800">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-slate-800 dark:text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m8.66-10h-1M4.34 12h-1m15.36 6.36l-.7-.7M6.34 6.34l-.7-.7m12.02 0l-.7.7M6.34 17.66l-.7.7M12 7a5 5 0 100 10 5 5 0 000-10z"/>
          </svg>
        </button>
      </nav>

      <!-- HAMBURGER (mobile only) -->
      <button class="nav-hamburger text-black dark:text-white" onclick="toggleMobileMenu()" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </div>

  <!-- MOBILE DROPDOWN MENU -->
  <div id="mobileMenu" class="nav-menu-mobile">
    <a href="/" class="block px-4 py-2 rounded-lg hover:bg-gray-200 dark:hover:bg-white/20 transition">Home</a>
    <a href="/history" class="block px-4 py-2 rounded-lg bg-white text-black dark:bg-white dark:text-black font-medium">History</a>
    <button onclick="toggleTheme()" class="text-left px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-800 w-full">Toggle Theme</button>
  </div>
</header>

<!-- ===== MAIN CONTENT ===== -->
<div class="pt-28 px-6 pb-10 max-w-6xl mx-auto">

  <div class="glass p-8 rounded-3xl shadow-2xl border border-slate-200">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-3xl font-bold text-black dark:text-white">Scan History</h1>
      <span class="bg-indigo-100 text-indigo-600 dark:bg-indigo-900 dark:text-indigo-300 px-4 py-1 rounded-full text-sm font-medium">
        Total Scans: {{ scans|length }}
      </span>
    </div>

    <div class="overflow-x-auto rounded-2xl shadow-sm border border-slate-200">
      <table class="min-w-full text-sm text-left">
        <thead class="table-header text-white">
          <tr>
            <th class="px-6 py-4">ID</th>
            <th class="px-6 py-4">URL</th>
            <th class="px-6 py-4">Result</th>
            <th class="px-6 py-4">Threat %</th>
          </tr>
        </thead>

        <tbody class="divide-y divide-slate-200 dark:divide-gray-700 bg-white dark:bg-black/50">
          {% for scan in scans %}
          <tr class="hover:bg-gray-100 dark:hover:bg-white/10 transition">
            <td class="px-6 py-4 font-medium text-slate-700 dark:text-white">{{ scan[0] }}</td>
            <td class="px-6 py-4 break-all text-slate-600 dark:text-gray-300">{{ scan[1] }}</td>
            <td class="px-6 py-4">
              {% if scan[3] < 30 %}
                <span class="px-3 py-1 text-xs font-semibold rounded-full bg-green-100 text-green-700 dark:bg-green-900 dark:text-green-300">Safe</span>
              {% elif scan[3] < 70 %}
                <span class="px-3 py-1 text-xs font-semibold rounded-full bg-yellow-100 text-yellow-700 dark:bg-yellow-900 dark:text-yellow-300">Suspicious</span>
              {% else %}
                <span class="px-3 py-1 text-xs font-semibold rounded-full bg-red-100 text-red-700 dark:bg-red-900 dark:text-red-300">Dangerous</span>
              {% endif %}
            </td>
            <td class="px-6 py-4 font-semibold {% if scan[3] < 30 %}text-green-600 dark:text-green-300{% elif scan[3] < 70 %}text-yellow-600 dark:text-yellow-300{% else %}text-red-600 dark:text-red-300{% endif %}">
              {{ scan[3] }}%
            </td>
          </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

  </div>

</div>

<script>
function toggleMobileMenu() {
  document.getElementById('mobileMenu').classList.toggle('open');
}
function toggleTheme() {
  document.documentElement.classList.toggle('dark');
}
if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
    document.documentElement.classList.add('dark');
}
const canvas = document.getElementById("particle-network");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];
const count = 80;

for(let i=0;i<count;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

const isDark=document.documentElement.classList.contains("dark");

const particleColor=isDark?"white":"#111827";
const lineColor=isDark?"rgba(255,255,255,0.25)":"rgba(0,0,0,0.15)";

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,2,0,Math.PI*2);
ctx.fillStyle=particleColor;
ctx.fill();

});

for(let i=0;i<particles.length;i++){
for(let j=i+1;j<particles.length;j++){

let dx=particles[i].x-particles[j].x;
let dy=particles[i].y-particles[j].y;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){

ctx.beginPath();
ctx.moveTo(particles[i].x,particles[i].y);
ctx.lineTo(particles[j].x,particles[j].y);
ctx.strokeStyle=lineColor;
ctx.stroke();

}

}
}

requestAnimationFrame(draw);

}

draw();
</script>

</body>
</html>
