<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<title>Admin Login / Sign Up</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
.glass{
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}
</style>

</head>

<body class="bg-black text-white flex items-center justify-center min-h-screen">

<div class="glass p-10 rounded-2xl w-full max-w-md text-center">

  <!-- Toggle title -->
  <h2 id="formTitle" class="text-2xl font-bold mb-6">Login</h2>

  <!-- Login Form -->
  <form id="loginForm" class="space-y-4" method="POST" action="{{ url_for('login') }}">
    <input id="loginUsername" type="text" name="username" placeholder="Username" required class="w-full p-3 rounded-lg bg-black border border-gray-700">
    <input id="loginPassword" type="password" name="password" placeholder="Password" required class="w-full p-3 rounded-lg bg-black border border-gray-700">
    <button type="submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-cyan-400 to-blue-500 text-black font-semibold">
      Login
    </button>
  </form>

  <!-- Sign Up Form -->
  <form id="signupForm" class="space-y-4 hidden" method="POST" action="{{ url_for('signup') }}">
    <input id="signupUsername" type="text" name="username" placeholder="Username" required class="w-full p-3 rounded-lg bg-black border border-gray-700">
    <input id="signupPassword" type="password" name="password" placeholder="Password" required class="w-full p-3 rounded-lg bg-black border border-gray-700">
    <input id="signupConfirm" type="password" name="confirm" placeholder="Confirm Password" required class="w-full p-3 rounded-lg bg-black border border-gray-700">
    <button type="submit" class="w-full py-3 rounded-lg bg-gradient-to-r from-purple-500 to-pink-500 text-black font-semibold">
      Sign Up
    </button>
  </form>

  <!-- Toggle Links -->
  <p class="mt-4 text-sm text-gray-400">
    <span id="toggleTextLogin">Don't have an account? <a href="#" id="showSignup" class="text-white underline">Sign Up</a></span>
    <span id="toggleTextSignup" class="hidden">Already have an account? <a href="#" id="showLogin" class="text-white underline">Login</a></span>
  </p>

  <a href="/" class="block mt-4 text-sm text-gray-400 hover:text-white">
    ← Back to Home
  </a>

</div>

<script>
// Toggle between Login and Sign Up forms
const loginForm = document.getElementById("loginForm");
const signupForm = document.getElementById("signupForm");
const formTitle = document.getElementById("formTitle");
const toggleTextLogin = document.getElementById("toggleTextLogin");
const toggleTextSignup = document.getElementById("toggleTextSignup");

document.getElementById("showSignup").addEventListener("click", function(e){
  e.preventDefault();
  loginForm.classList.add("hidden");
  signupForm.classList.remove("hidden");
  formTitle.textContent = "Sign Up";
  toggleTextLogin.classList.add("hidden");
  toggleTextSignup.classList.remove("hidden");
});

document.getElementById("showLogin").addEventListener("click", function(e){
  e.preventDefault();
  signupForm.classList.add("hidden");
  loginForm.classList.remove("hidden");
  formTitle.textContent = "Login";
  toggleTextSignup.classList.add("hidden");
  toggleTextLogin.classList.remove("hidden");
});

// Show signup form if Flask passed show_signup
{% if show_signup %}
loginForm.classList.add("hidden");
signupForm.classList.remove("hidden");
formTitle.textContent = "Sign Up";
toggleTextLogin.classList.add("hidden");
toggleTextSignup.classList.remove("hidden");
{% endif %}
</script>

</body>
</html>
